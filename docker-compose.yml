# Сборка и запуск как в https://habr.com/ru/companies/selectel/articles/836228/
# Nginx :80 → Next.js; static-server доступен приложению по имени сервиса.
#
# Подготовьте .env в корне репозитория (или экспортируйте переменные) с:
#   NEXT_PUBLIC_SUPABASE_URL (для сборки и клиента)
#   NEXT_PUBLIC_SUPABASE_ANON_KEY  (или NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY)
#   Опционально сервер без пересборки, если в образе зашиты пустые NEXT_PUBLIC_*:
#   SUPABASE_URL и SUPABASE_ANON_KEY или SUPABASE_PUBLISHABLE_KEY (те же строки)
#   GIGACHAT_CLIENT_ID, GIGACHAT_CLIENT_SECRET
#   GIGACHAT_CA_CERT — путь внутри контейнера к PEM (по умолчанию /app/certs/russian_root.crt).
#   Положите файл на сервере в ./docker/certs/russian_root.crt рядом с compose — он смонтируется в контейнер.
#
# Запуск: docker compose up --build

networks:
  dev:
    driver: bridge

services:
  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf
      # Certbot на сервере кладёт ключи в /etc/letsencrypt; ./etc/letsencrypt в репо пустой → nginx не видит fullchain.pem
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
      - static-server
    networks:
      - dev

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      # Подставляет переменные из .env в среду шага `RUN pnpm build` (файл .env в образ не попадает).
      env_file:
        - .env
    env_file:
      - .env
    environment:
      STATIC_SERVER_URL: http://static-server:3001
      # Supabase NEXT_PUBLIC_* только из env_file выше. Дублирование через ${VAR} здесь при пустой
      # подстановке перезаписывает env_file — в контейнере ключ оказывается пустым.
      # Корень НУЦ для TLS к GigaChat; путь в контейнере. Файл с хоста: ./docker/certs/russian_root.crt
      GIGACHAT_CA_CERT: ${GIGACHAT_CA_CERT:-/app/certs/russian_root.crt}
    volumes:
      - ./docker/certs:/app/certs:ro
    depends_on:
      - static-server
    networks:
      - dev

  static-server:
    build:
      context: .
      dockerfile: docker/static-server.Dockerfile
    networks:
      - dev
