<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <title>Unit 3 — Контрольная работа (вариант A)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page">
      <header class="intro">
        <h1>Unit 3 — Контрольная работа (вариант A)</h1>
        <p>
          Интерактивный тест по грамматике, лексике, чтению и аудированию
        </p>
        <label class="student-label" for="student-name">ФИО студента</label>
        <input
          class="student-name"
          type="text"
          id="student-name"
          name="student_name"
          autocomplete="name"
          placeholder="Например, Иванова Мария Сергеевна"
        />
      </header>

      <div id="test-root" class="test-root" role="main"></div>

      <div class="actions">
        <button type="button" id="finish-btn">Завершить тест и показать результаты</button>
      </div>

      <section class="result-panel" id="result-panel" aria-live="polite">
        <h3>Итог</h3>
        <p class="score" id="score-line"></p>
      </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
