user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;

  # HTTPS: vhost в docker/nginx-https.server.conf; без файлов в live/<домен>/ nginx не стартует.
  # Локально без Let's Encrypt — закомментируйте include ниже и volume https в docker-compose.yml.
  server {
    listen 80 default_server;
    server_name lingua-bloom.ru www.lingua-bloom.ru;
    client_max_body_size 50m;

    # Docker встроенный DNS; без этого nginx резолвит app при старте и падает,
    # если имя сервиса ещё не в DNS (порядок запуска контейнеров).
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    location / {
      set $upstream_app app:3000;
      proxy_pass http://$upstream_app$request_uri;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;

      # OAuth /auth/callback: Supabase ставит несколько больших Set-Cookie;
      # дефолтный proxy_buffer_size (4–8k) даёт 502 «upstream sent too big header».
      proxy_buffer_size 64k;
      proxy_buffers 8 64k;
      proxy_busy_buffers_size 128k;
    }

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
  }

  include /etc/nginx/https-server.conf;
}
